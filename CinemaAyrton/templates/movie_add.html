{% extends 'base.html' %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0"><i class="fas fa-plus me-2"></i>Adicionar Novo Filme</h4>
                </div>
                <div class="card-body">
                    <form id="movie-form" method="POST" action="{{ url_for('movie_add') }}">
                        <!-- Title -->
                        <div class="mb-3">
                            <label for="title" class="form-label">Título <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="title" name="title" required>
                        </div>
                        
                        <!-- Director -->
                        <div class="mb-3">
                            <label for="director" class="form-label">Diretor</label>
                            <input type="text" class="form-control" id="director" name="director">
                        </div>
                        
                        <div class="row">
                            <!-- Release Year -->
                            <div class="col-md-4">
                                <div class="mb-3">
                                    <label for="release_year" class="form-label">Ano de Lançamento</label>
                                    <input type="number" class="form-control" id="release_year" name="release_year" min="1888" max="{{ 2025 + 5 }}">
                                </div>
                            </div>
                            
                            <!-- Genre -->
                            <div class="col-md-4">
                                <div class="mb-3">
                                    <label for="genre" class="form-label">Gênero</label>
                                    <input type="text" class="form-control" id="genre" name="genre" list="genre-list">
                                    <datalist id="genre-list">
                                        {% for genre in genres %}
                                        <option value="{{ genre }}">
                                        {% endfor %}
                                    </datalist>
                                </div>
                            </div>
                            
                            <!-- Duration -->
                            <div class="col-md-4">
                                <div class="mb-3">
                                    <label for="duration" class="form-label">Duração (minutos)</label>
                                    <input type="number" class="form-control" id="duration" name="duration" min="1">
                                </div>
                            </div>
                        </div>
                        
                        <!-- Rating -->
                        <div class="mb-3">
                            <label for="rating" class="form-label">Classificação (0-10)</label>
                            <div class="rating-input mb-2">
                                <input type="hidden" name="rating" id="rating" value="0">
                                <i class="rating-star far fa-star" data-value="1"></i>
                                <i class="rating-star far fa-star" data-value="2"></i>
                                <i class="rating-star far fa-star" data-value="3"></i>
                                <i class="rating-star far fa-star" data-value="4"></i>
                                <i class="rating-star far fa-star" data-value="5"></i>
                            </div>
                            <div class="form-text">Clique nas estrelas para avaliar ou insira um valor numérico abaixo.</div>
                            <input type="number" class="form-control" id="rating_input" step="0.1" min="0" max="10">
                        </div>
                        
                        <!-- Poster URL -->
                        <div class="mb-3">
                            <label for="poster" class="form-label">URL do Poster</label>
                            <input type="url" class="form-control" id="poster" name="poster" placeholder="https://example.com/poster.jpg">
                            <div class="form-text">Adicione a URL de uma imagem online para o poster do filme.</div>
                        </div>
                        
                        <!-- Synopsis -->
                        <div class="mb-3">
                            <label for="synopsis" class="form-label">Sinopse</label>
                            <textarea class="form-control" id="synopsis" name="synopsis" rows="4"></textarea>
                        </div>
                        
                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <a href="{{ url_for('movies') }}" class="btn btn-secondary me-md-2">
                                <i class="fas fa-times me-1"></i> Cancelar
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save me-1"></i> Salvar Filme
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    // Handle custom rating input field
    document.addEventListener('DOMContentLoaded', function() {
        const ratingStars = document.querySelectorAll('.rating-star');
        const ratingInput = document.getElementById('rating');
        const ratingNumberInput = document.getElementById('rating_input');
        
        // Set rating from stars
        ratingStars.forEach(function(star) {
            star.addEventListener('click', function() {
                const value = parseInt(this.getAttribute('data-value'));
                ratingInput.value = value * 2; // Convert to scale of 10
                ratingNumberInput.value = value * 2;
                
                // Update stars display
                ratingStars.forEach(function(s, index) {
                    if (index < value) {
                        s.classList.add('fas');
                        s.classList.remove('far');
                    } else {
                        s.classList.add('far');
                        s.classList.remove('fas');
                    }
                });
            });
        });
        
        // Set rating from number input
        ratingNumberInput.addEventListener('change', function() {
            const value = parseFloat(this.value);
            if (value >= 0 && value <= 10) {
                ratingInput.value = value;
                const starValue = Math.round(value / 2);
                
                // Update stars display
                ratingStars.forEach(function(s, index) {
                    if (index < starValue) {
                        s.classList.add('fas');
                        s.classList.remove('far');
                    } else {
                        s.classList.add('far');
                        s.classList.remove('fas');
                    }
                });
            }
        });
        
        // Handle form validation
        const movieForm = document.getElementById('movie-form');
        if (movieForm) {
            movieForm.addEventListener('submit', function(e) {
                if (!validateMovieForm()) {
                    e.preventDefault();
                }
            });
        }
    });
</script>
{% endblock %}
