{% extends 'base.html' %}

{% block content %}
<div class="container text-center py-5">
    <div class="error-page">
        <h1 class="display-1 text-danger">404</h1>
        <h2 class="mb-4">Página Não Encontrada</h2>
        <p class="lead mb-4">Ops! A página que você está procurando não existe ou foi movida.</p>
        <div class="d-flex justify-content-center">
            <a href="{{ url_for('index') }}" class="btn btn-primary me-2">
                <i class="fas fa-home me-1"></i> Voltar para o Início
            </a>
            <a href="{{ url_for('movies') }}" class="btn btn-info">
                <i class="fas fa-film me-1"></i> Explorar Filmes
            </a>
        </div>
    </div>
</div>
{% endblock %}
